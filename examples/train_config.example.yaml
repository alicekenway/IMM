model:
  model_name_or_path: "Qwen/Qwen2.5-0.5B"
  torch_dtype: "bf16"
  trust_remote_code: false

memory_dimensions:
  hidden_dim: 896
  key_dim: 192
  value_dim: 192

memory_slots:
  session_slots: 64
  working_slots: 16

turn_summary:
  pooling_strategy: "last_token"
  use_layer_norm: true

controller:
  session_merge_gate: 1.0
  use_working_memory: false
  working_merge_gate: 1.0

placement:
  enable_imm: true
  top_fraction: 0.5

lora:
  enabled: true
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

data:
  dataset_path: "/home/jinyang_wang/Dev/LLM/IMM/v1_train_sample.json"
  max_length: 1024
  max_history_line_length: 256
  max_history_lines: 16
  include_history: true
  append_eos_token: true
  derive_history_lookup_mask_from_labels: true

training:
  use_accelerate: true
  mixed_precision: "bf16"
  learning_rate_lora: 2.0e-4
  learning_rate_imm: 2.0e-4
  weight_decay: 0.01
  batch_size: 4
  num_epochs: 3
  grad_accum_steps: 1
  max_grad_norm: 1.0
  log_every_steps: 10
  save_every_steps: 0
  output_dir: "/home/jinyang_wang/Dev/LLM/IMM/outputs/imm_qwen"
  seed: 42

